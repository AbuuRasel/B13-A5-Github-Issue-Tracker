<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
  </head>

  <body class="login-page">
    <div class="login-card">
      <div class="logo-circle">
        <img src="./assets/github-logo.png" alt="" />
      </div>

      <h2>GitHub Issues Tracker</h2>
      <p class="subtitle">Sign in to manage your issues</p>

      <label>Username</label>
      <input id="username" placeholder="Enter Username" />
      <p class="hint">Default: admin</p>

      <label>Password</label>
      <input id="password" type="password" placeholder="Enter Password" />
      <p class="hint">Default: admin123</p>

      <button onclick="login()">Sign In</button>

      <div class="divider">OR</div>

      <div class="demo-box">
        <p><b>Demo Credentials</b></p>
        <p>Username: admin</p>
        <p>Password: admin123</p>
      </div>
    </div>
    <script src="js/login.js"></script>
  </body>
</html>
